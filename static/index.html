<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Scheduling Agent</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #171717;
      --text: #ffffff;
      --muted: #b3b3b3;
      --accent: #6c63ff;
      --accent-hover: #5a52db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    #status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 20px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--accent);
      color: var(--text);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
  <script>
    (function(d, t) {
      var g = document.createElement(t), s = d.getElementsByTagName(t)[0];
      g.src = "https://cdn.jsdelivr.net/npm/@vapi-ai/web@2.5.2/dist/vapi.umd.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g, s);
    })(document, "script");
  </script>
</head>
<body>
  <main class="card">
    <h1>Voice Scheduling Agent</h1>
    <p>Click the button below to schedule a meeting using your voice.</p>
    <div id="status"></div>
    <button id="call-button" type="button">Start call</button>
  </main>

  <script>
    const VAPI_PUBLIC_KEY = "f66f39d8-22bf-4ae4-be93-c8b6da0f75ad";
    const VAPI_ASSISTANT_ID = "7365ac4a-57f2-4028-9774-1aeea239b5dc";

    const callButton = document.getElementById("call-button");
    const statusEl = document.getElementById("status");

    let vapi = null;
    let callActive = false;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateButton() {
      callButton.textContent = callActive ? "End call" : "Start call";
      callButton.style.background = callActive ? "#c0392b" : "var(--accent)";
    }

    function initVapi() {
      if (vapi) return;
      if (!window.Vapi) {
        throw new Error("VAPI SDK did not load yet. Please try again.");
      }
      vapi = new window.Vapi(VAPI_PUBLIC_KEY);

      vapi.on("call-start", () => {
        setStatus("Call connected — speak now.");
      });

      vapi.on("call-end", () => {
        callActive = false;
        updateButton();
        setStatus("Call ended.");
      });

      vapi.on("speech-start", () => setStatus("Assistant is speaking..."));
      vapi.on("speech-end", () => setStatus("Listening..."));

      vapi.on("error", (e) => {
        console.error("VAPI error:", e);
        callActive = false;
        updateButton();
        setStatus("An error occurred. Please try again.");
      });
    }

    callButton.addEventListener("click", async () => {
      callButton.disabled = true;
      try {
        initVapi();

        if (!callActive) {
          setStatus("Connecting...");
          await vapi.start(VAPI_ASSISTANT_ID);
          callActive = true;
        } else {
          await vapi.stop();
          callActive = false;
          setStatus("");
        }

        updateButton();
      } catch (e) {
        console.error("Call toggle failed:", e);
        setStatus(e.message || "Failed to connect. Please try again.");
        callActive = false;
        updateButton();
      } finally {
        callButton.disabled = false;
      }
    });
  </script>
</body>
</html>
